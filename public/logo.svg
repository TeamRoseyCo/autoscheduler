<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="50%" style="stop-color:#4834D4"/>
      <stop offset="100%" style="stop-color:#2D1B8E"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A29BFE"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#C44569"/>
    </linearGradient>
    <linearGradient id="calGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E8E6FF;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle pattern overlay -->
  <circle cx="420" cy="100" r="180" fill="#fff" opacity="0.03"/>
  <circle cx="90" cy="420" r="140" fill="#fff" opacity="0.03"/>

  <!-- Calendar body -->
  <g filter="shadow">
    <!-- Calendar sheet -->
    <rect x="96" y="140" width="320" height="280" rx="20" ry="20" fill="url(#calGrad)"/>

    <!-- Calendar top bar / header -->
    <rect x="96" y="120" width="320" height="60" rx="20" ry="20" fill="#fff" opacity="0.95"/>
    <rect x="96" y="155" width="320" height="25" fill="#fff" opacity="0.95"/>

    <!-- Calendar rings -->
    <rect x="176" y="104" width="16" height="40" rx="8" fill="url(#accentGrad)"/>
    <rect x="320" y="104" width="16" height="40" rx="8" fill="url(#accentGrad)"/>
  </g>

  <!-- Grid lines -->
  <line x1="130" y1="200" x2="382" y2="200" stroke="#D0CCF0" stroke-width="1.5"/>
  <line x1="130" y1="248" x2="382" y2="248" stroke="#D0CCF0" stroke-width="1.5"/>
  <line x1="130" y1="296" x2="382" y2="296" stroke="#D0CCF0" stroke-width="1.5"/>
  <line x1="130" y1="344" x2="382" y2="344" stroke="#D0CCF0" stroke-width="1.5"/>

  <!-- Vertical grid -->
  <line x1="202" y1="200" x2="202" y2="390" stroke="#D0CCF0" stroke-width="1"/>
  <line x1="274" y1="200" x2="274" y2="390" stroke="#D0CCF0" stroke-width="1"/>
  <line x1="346" y1="200" x2="346" y2="390" stroke="#D0CCF0" stroke-width="1"/>

  <!-- Scheduled blocks (colored bars representing auto-scheduled tasks) -->
  <!-- Block 1 - purple -->
  <rect x="138" y="210" width="56" height="30" rx="6" fill="#6C5CE7" opacity="0.85"/>
  <!-- Block 2 - pink -->
  <rect x="210" y="256" width="56" height="38" rx="6" fill="#FF6B9D" opacity="0.85"/>
  <!-- Block 3 - purple -->
  <rect x="282" y="210" width="56" height="22" rx="6" fill="#A29BFE" opacity="0.85"/>
  <!-- Block 4 - accent -->
  <rect x="138" y="302" width="56" height="34" rx="6" fill="#4834D4" opacity="0.7"/>
  <!-- Block 5 - pink -->
  <rect x="354" y="300" width="50" height="40" rx="6" fill="#C44569" opacity="0.7"/>
  <!-- Block 6 -->
  <rect x="282" y="350" width="56" height="26" rx="6" fill="#6C5CE7" opacity="0.6"/>

  <!-- AI sparkle / magic wand effect (top-right) -->
  <g filter="glow" transform="translate(360, 80)">
    <!-- Main 4-point star -->
    <path d="M0,-28 C4,-10 10,-4 28,0 C10,4 4,10 0,28 C-4,10 -10,4 -28,0 C-10,-4 -4,-10 0,-28Z"
          fill="url(#accentGrad)"/>
    <!-- Small sparkle -->
    <path d="M30,-20 C32,-14 34,-12 40,-10 C34,-8 32,-6 30,0 C28,-6 26,-8 20,-10 C26,-12 28,-14 30,-20Z"
          fill="#FFD5E5" opacity="0.9"/>
    <!-- Tiny sparkle -->
    <path d="M-18,-30 C-16.5,-26 -15.5,-25 -12,-23.5 C-15.5,-22 -16.5,-21 -18,-17 C-19.5,-21 -20.5,-22 -24,-23.5 C-20.5,-25 -19.5,-26 -18,-30Z"
          fill="#FFD5E5" opacity="0.7"/>
  </g>

  <!-- Circular arrow (automation/auto-schedule symbol) - bottom left -->
  <g transform="translate(108, 410)" filter="glow">
    <path d="M-10,-22 A24,24 0 1,1 -22,8"
          fill="none" stroke="#A29BFE" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow head -->
    <polygon points="-28,2 -16,2 -22,14" fill="#A29BFE" opacity="0.9"/>
  </g>
</svg>